services:
  postgres:
    image: postgres:16-alpine
    container_name: dataarena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dataarena
      POSTGRES_PASSWORD: dataarena_dev
      POSTGRES_DB: dataarena
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataarena -d dataarena"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dataarena-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
